version: '3.9'

services:
  backend:
    build: ./backend
    container_name: cleansplit-backend
    environment:
      - DATABASE_URL=sqlite:////data/cleansplit.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    volumes:
      - db_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cleansplit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
